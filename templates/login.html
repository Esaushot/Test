{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card shadow">
            <div class="card-body text-center">
                <img src="{{ url_for('static', filename='logo.png') }}" class="mb-3" alt="Logo UPTIS" style="width: 100px; height: auto;">
                <h4>Acceso al Sistema</h4>
                
                <form method="POST" class="mt-4 text-start">
                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input type="email" name="correo" class="form-control" placeholder="usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                
                <p class="mt-3 small text-muted">Garfield es una perra.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
